services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talentos-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentos-frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    depends_on:
      - api

